# Starship Configuration
# Docs: https://starship.rs/config/

# Timeout for commands
command_timeout = 500

# Format - customize the prompt structure
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$line_break\
$character"""

# Prompt character
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

# Directory
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = " 🔒"

# Git branch
[git_branch]
symbol = "🌱 "
style = "bold purple"
truncation_length = 20

# Git status
[git_status]
style = "bold yellow"
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
conflicted = "🏳"
untracked = "🤷"
stashed = "📦"
modified = "📝"
staged = '[++\($count\)](green)'
renamed = "👅"
deleted = "🗑"

# Languages
[python]
symbol = "🐍 "
style = "yellow bold"

[nodejs]
symbol = "⬢ "
style = "bold green"

[rust]
symbol = "🦀 "
style = "bold red"

[golang]
symbol = "🐹 "
style = "bold cyan"

# Docker
[docker_context]
symbol = "🐳 "
style = "blue bold"

# Username (only show when needed)
[username]
show_always = false
style_user = "bold yellow"
style_root = "bold red"

# Hostname (only show when SSH)
[hostname]
ssh_only = true
style = "bold dimmed green"

# Command duration
[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow)"

# Battery (optional - uncomment to enable)
# [battery]
# full_symbol = "🔋"
# charging_symbol = "⚡️"
# discharging_symbol = "💀"
# [[battery.display]]
# threshold = 30
# style = "bold red"
